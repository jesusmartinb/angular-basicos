
<h1>{{ nombre }}</h1>

<dl>
  <dt>Nombre:</dt>
  <dd>{{ nombre }}</dd>

  <dt>Edad:</dt>
  <dd>{{ edad }}</dd>

  <dt>Función:</dt>
  <dd>{{ obtenerNombre() }}</dd>

  <dt>Capitalizado:</dt>
  <dd>{{ nombreCapitalizado }}</dd>
</dl>

<button (click)="cambiarNombre()">
  Cambiar Héroe
</button>

<button (click)="cambiarEdad()">
  Cambiar edad
</button>

<!-- Enlazado en una sola vía - one way data binding - Las propiedades están enlazadas de una única manera con las propiedades del componente, es decir si las propiedades cambian en el componente.ts se redibujan en el componente.html pero no se puede cambiar en el template y que esto cambie en la clase HeroeComponent del componente.ts. Hay formas de hacerlo usando un campo de formulario aunque habitualmente se recomienda prevenir trabajar con el - two way data binding - se recomienda el one way data binding. -->
